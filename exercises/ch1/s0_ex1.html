<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ćwiczenie 1 — Połącz pytania i odpowiedzi</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Rozdział I: Skąd jesteś?</h1>
    <h2>Ćwiczenie 1 — Połącz pytania i odpowiedzi</h2>
    
    <div class="chapter-info">
        Strona 7 podręcznika. Czasownik „być" — czas teraźniejszy.
    </div>

    <div class="exercise-container">
        <p class="instruction">Połącz pytania (0–10) z odpowiedziami (A–K). Kliknij pytanie po lewej, potem odpowiedź po prawej.</p>
        
        <div id="matching-container"></div>

        <div class="buttons">
            <button class="btn btn-check" onclick="exercise.check()">Sprawdź ✓</button>
            <button class="btn btn-clear" onclick="exercise.clear()">Wyczyść ✕</button>
            <a href="../index.html" class="btn btn-nav">← Menu</a>
            <a href="s0_ex2.html" class="btn btn-nav">Dalej →</a>
        </div>
        <div id="result" class="result"></div>
    </div>

    <script src="../script.js"></script>
    <script>
        const leftItems = [
            '– Cześć. Jestem Pola, a ty?',
            '– Skąd jesteś?',
            '– Czy jesteś studentką?',
            '– Który raz jesteś w Polsce?',
            '– A jak długo tu jesteś?',
            '– Czy język polski jest dla ciebie trudny?',
            '– Jaka jest twoja metoda nauki?',
            '– A jakie jest twoje hobby?',
            '– Z kim tu jesteś?',
            '– Jesteście razem na kursie polskiego?',
            '– A czy lekcje są ciekawe?'
        ];

        const rightItems = [
            '– Nie, jestem uczennicą.',           // A
            '– Miesiąc.',                          // B
            '– Ważne jest to, żeby dużo czytać i mówić.', // C
            '– Z Ukrainy.',                        // D
            '– Języki obce i koszykówka.',         // E
            '– Tak, ale jesteśmy w różnych grupach.', // F
            '– Nie, jest dość łatwy.',             // G
            '– Olga.',                             // H
            '– Tak, są bardzo interesujące.',      // I
            '– Pierwszy.',                         // J
            '– Z rodziną.'                         // K
        ];

        // Correct answers: leftIndex -> rightIndex
        // Key: 1-D(3), 2-A(0), 3-J(9), 4-B(1), 5-G(6), 6-C(2), 7-E(4), 8-K(10), 9-F(5), 10-I(8)
        const correctAnswers = {
            0: 7,   // H
            1: 3,   // D
            2: 0,   // A
            3: 9,   // J
            4: 1,   // B
            5: 6,   // G
            6: 2,   // C
            7: 4,   // E
            8: 10,  // K
            9: 5,   // F
            10: 8   // I
        };

        // Pre-filled: 0 -> H (index 7)
        const prefilledPairs = { 0: 7 };

        const exercise = new MatchingExercise(
            'matching-container',
            leftItems,
            rightItems,
            correctAnswers,
            prefilledPairs
        );
    </script>
</body>
</html>
